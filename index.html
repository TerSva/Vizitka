<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tereza Britta Švanda · UI/UX & Ilustrace</title>
<meta name="description" content="Tereza Britta Švanda — UI/UX designérka & ilustrátorka. Technické myšlení, umělecká duše. Karlovarský kraj.">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

:root {
  --emerald:    #004D40;
  --bg-deep:    #012622;
  --bg-darkest: #001F1C;
  --champagne:  #F5F5DC;
  --gold-hot:   #FFD700;
  --gold-warm:  #B8860B;
  --gold-soft:  #D4A744;
  --muted:      #7aad9a;
  --surface-1:  rgba(255, 255, 255, 0.05);
  --surface-2:  rgba(255, 255, 255, 0.07);
  --border-1:   rgba(255, 255, 255, 0.10);
  --border-2:   rgba(255, 255, 255, 0.12);
}

html, body {
  height: 100%;
  background: var(--bg-darkest);
  color: var(--champagne);
  font-family: 'Space Grotesk', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ══════════════════════════════════════════
   AMBIENT GLOW POZADÍ (vícevrstvé)
══════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(0,77,64,0.40) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(184,134,11,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 45%, rgba(0,77,64,0.18) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Jemný noise texture overlay pro "artistic" pocit */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E"),
    repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 60px,
      rgba(0,77,64,0.04) 60px,
      rgba(0,77,64,0.04) 61px
    );
  opacity: 0.5;
  pointer-events: none;
  z-index: 0;
  mix-blend-mode: overlay;
}

.card-wrap {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.25rem 0.85rem;
  position: relative;
  z-index: 1;
}

.card-stack {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  animation: stackIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes stackIn {
  from { opacity: 0; transform: translateY(24px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ══════════════════════════════════════════
   GLASSMORPHISM — jemnější, elegantnější
══════════════════════════════════════════ */
.glass-card {
  background: var(--surface-1);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-1);
  box-shadow:
    0 14px 44px rgba(0, 0, 0, 0.5),
    0 2px 6px rgba(0, 0, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.06);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}

/* ══════════════════════════════════════════
   HORNÍ KARTA — identity
══════════════════════════════════════════ */
.card-top {
  padding: 2.25rem 2rem 1.75rem;
  text-align: center;
}

.card-top::before {
  content: '';
  position: absolute;
  top: -40%;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 100%;
  background: radial-gradient(ellipse at center, rgba(0, 77, 64, 0.22) 0%, transparent 65%);
  filter: blur(40px);
  pointer-events: none;
}

/* ── Portrét ── */
.portrait {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  margin: 0 auto 1.25rem;
  position: relative;
  z-index: 2;
  animation: portraitReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
}

@keyframes portraitReveal {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}

.portrait::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: conic-gradient(
    from 180deg,
    rgba(184, 134, 11, 0.6) 0deg,
    rgba(255, 215, 0, 0.2) 90deg,
    rgba(184, 134, 11, 0.4) 180deg,
    rgba(245, 245, 220, 0.15) 270deg,
    rgba(184, 134, 11, 0.6) 360deg
  );
  opacity: 0.7;
  filter: blur(1px);
  z-index: -1;
  animation: ringRotate 20s linear infinite;
}

@keyframes ringRotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.portrait img,
.portrait .portrait-fallback {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  border: 2px solid var(--bg-darkest);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

/* Fallback kdyby foto chybělo — elegantní monogram */
.portrait-fallback {
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #004D40 0%, #001F1C 100%);
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 2rem;
  color: var(--champagne);
  letter-spacing: 0.02em;
}

/* ── Jméno ── */
.name-block {
  position: relative;
  z-index: 1;
}

.card-firstname {
  font-family: 'DM Serif Display', serif;
  font-weight: 400;
  font-style: normal;
  font-size: clamp(2.8rem, 9.5vw, 3.6rem);
  line-height: 1.0;
  color: var(--champagne);
  letter-spacing: -0.015em;
  display: block;
}

.card-surname {
  font-family: 'DM Serif Display', serif;
  font-weight: 400;
  font-style: italic;
  font-size: clamp(2.2rem, 7.5vw, 2.9rem);
  line-height: 1.1;
  color: var(--champagne);
  opacity: 0.72;
  letter-spacing: -0.01em;
  display: block;
  margin-top: 0.1em;
}

/* ── Tagline — poetický citát, DM Serif pro brand consistency ── */
.card-tagline {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.15rem;
  color: var(--champagne);
  line-height: 1.4;
  margin-top: 1.2rem;
  opacity: 0.95;
  position: relative;
  z-index: 1;
}

.card-tagline .accent {
  font-style: italic;
  color: var(--gold-soft);
  opacity: 1;
}

/* ── Ornament — jemná vlnovka ── */
.ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 1rem auto 0.85rem;
  gap: 0.5rem;
  opacity: 0.55;
  position: relative;
  z-index: 1;
}

.ornament svg {
  width: 28px;
  height: 8px;
  color: var(--gold-warm);
}

.ornament .dot-small {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--gold-warm);
}

/* ── Role line ── */
.card-role {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.66rem;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.18em;
  line-height: 1.5;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
  white-space: nowrap;
}

.card-role .dot {
  display: inline-block;
  margin: 0 0.5em;
  opacity: 0.5;
}

/* ══════════════════════════════════════════
   SPODNÍ KARTA — akce
══════════════════════════════════════════ */
.card-bottom {
  padding: 1.5rem 2rem 1.5rem;
}

.contact-group {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 1.5rem;
  align-items: center;
}

.contact-row {
  display: inline-flex;
  align-items: center;
  gap: 0.7rem;
  text-decoration: none;
  color: var(--champagne);
  font-size: 0.9rem;
  font-weight: 400;
  padding: 0.25rem 0.8rem;
  border-radius: 8px;
  min-height: 44px;
  cursor: pointer;
  transition: background 0.25s, color 0.25s;
}

.contact-row:hover {
  background: rgba(255, 255, 255, 0.04);
  color: var(--gold-hot);
}

.contact-row .ico {
  width: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--muted);
  transition: color 0.25s;
}

.contact-row:hover .ico { color: var(--gold-warm); }
.contact-row .ico svg { width: 16px; height: 16px; }

.divider {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(184, 134, 11, 0.25), transparent);
  margin: 0 0 1.25rem;
}

/* ══════════════════════════════════════════
   CTA GROUP — primary + secondary button
══════════════════════════════════════════ */
.cta-group {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

/* ── Primary button — SOLID GOLD ── */
.btn-primary {
  width: 100%;
  padding: 0.95rem 1.25rem;
  background: linear-gradient(135deg, #C9961E 0%, #B8860B 100%);
  border: 1px solid rgba(255, 215, 0, 0.35);
  border-radius: 12px;
  color: #001F1C;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.55rem;
  text-decoration: none;
  min-height: 50px;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 4px 16px rgba(184, 134, 11, 0.25),
    inset 0 1px 0 rgba(255, 255, 255, 0.25);
  transition: transform 0.25s, box-shadow 0.25s, filter 0.25s;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow:
    0 6px 24px rgba(184, 134, 11, 0.40),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
  filter: brightness(1.08);
}

.btn-primary:active { transform: scale(0.98); }
.btn-primary svg { width: 16px; height: 16px; flex-shrink: 0; stroke: #001F1C; }

/* Light sweep animace */
.btn-primary::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255, 255, 255, 0.25) 50%,
    transparent 100%
  );
  pointer-events: none;
  opacity: 0;
}

.btn-primary.confirmed {
  background: linear-gradient(135deg, rgba(0, 77, 64, 0.8) 0%, rgba(0, 77, 64, 0.6) 100%);
  border-color: rgba(110, 231, 183, 0.35);
  color: #6ee7b7;
  pointer-events: none;
}

.btn-primary.confirmed svg { stroke: #6ee7b7; }

.btn-primary.confirmed::after {
  opacity: 1;
  animation: lightSweep 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

@keyframes lightSweep {
  0%   { left: -100%; opacity: 1; }
  100% { left: 100%;  opacity: 0; }
}

/* ── Secondary button — Portfolio ── */
.btn-secondary {
  width: 100%;
  padding: 0.9rem 1.25rem;
  background: rgba(245, 245, 220, 0.03);
  border: 1px solid rgba(245, 245, 220, 0.30);
  border-radius: 12px;
  color: var(--champagne);
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 400;
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  text-decoration: none;
  min-height: 48px;
  transition: background 0.25s, border-color 0.25s, color 0.25s;
}

.btn-secondary:hover {
  background: rgba(184, 134, 11, 0.08);
  border-color: rgba(184, 134, 11, 0.55);
  color: var(--gold-soft);
}

.btn-secondary:active { transform: scale(0.99); }
.btn-secondary svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  opacity: 0.9;
}

/* ══════════════════════════════════════════
   SOCIAL CONSTELLATION
══════════════════════════════════════════ */
.social-wrap {
  margin-top: 1.25rem;
  padding-top: 1.1rem;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
}

.social-label {
  text-align: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  font-weight: 400;
  color: var(--muted);
  opacity: 0.85;
  margin-bottom: 0.85rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.social-row {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.social-icon {
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: var(--muted);
  text-decoration: none;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.social-icon:hover {
  color: var(--gold-hot);
  background: rgba(184, 134, 11, 0.10);
  border-color: rgba(184, 134, 11, 0.35);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(184, 134, 11, 0.15);
}

.social-icon svg {
  width: 16px;
  height: 16px;
}

/* ══════════════════════════════════════════
   ACCESSIBILITY
══════════════════════════════════════════ */
a:focus-visible, button:focus-visible {
  outline: none;
  box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.4), 0 0 16px rgba(255, 215, 0, 0.15);
  border-radius: 12px;
}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 360px) {
  .card-top { padding: 2rem 1.5rem 1.5rem; }
  .card-bottom { padding: 1.25rem 1.5rem; }
  .portrait { width: 76px; height: 76px; }
  .card-firstname { font-size: 2.3rem; }
  .card-surname { font-size: 1.95rem; }
  .card-tagline { font-size: 0.95rem; }
  .social-icon { width: 38px; height: 38px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
  .portrait::before { animation: none !important; }
}

</style>
</head>

  'NOTE:Od ilustrace a brandu po UI/UX. Technické myšlení\\, umělecká duše. Kde systém potkává cit.',
  'END:VCARD'
].join('\r\n');

const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
const url = URL.createObjectURL(blob);
const btn = document.getElementById('saveBtn');
btn.href = url;
btn.setAttribute('download', 'Tereza-Britta-Svanda.vcf');

// ═══════════════════════════════════════════
// Confirmation feedback s animací
// ═══════════════════════════════════════════
btn.addEventListener('click', function() {
  const textEl = document.getElementById('saveBtnText');
  const icoDefault = btn.querySelector('.ico-default');
  const icoCheck = btn.querySelector('.ico-check');

  btn.classList.add('confirmed');
  icoDefault.style.display = 'none';
  icoCheck.style.display = 'block';
  textEl.textContent = 'Uloženo';

  setTimeout(() => {
    btn.classList.remove('confirmed');
    icoDefault.style.display = 'block';
    icoCheck.style.display = 'none';
    textEl.textContent = 'Uložit kontakt';
  }, 2500);
});
</script>
